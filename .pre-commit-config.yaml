repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi, jupyter]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi, jupyter]

      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
